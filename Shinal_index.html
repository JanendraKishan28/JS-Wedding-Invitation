<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080604">
<title>Shinal &amp; Janendra — Wedding 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080604;font-family:'Raleway',sans-serif;overflow:hidden;color:#f0e8d8}
#particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:1}
#glitter-canvas{position:fixed;inset:0;pointer-events:none;z-index:10}
.wrap{width:100%;height:100dvh;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .8s ease;z-index:2;
  padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
.screen.on{opacity:1;pointer-events:all}
#s0{display:flex;flex-direction:column;align-items:center;justify-content:center}
.cover-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.52;z-index:0}
.cover-fade{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,6,4,.2) 0%,rgba(8,6,4,.5) 55%,rgba(8,6,4,.97) 100%);z-index:0}
.cover-body{position:relative;z-index:2;text-align:center;padding:1.2rem 2.5rem}
.pre-tag{font-size:clamp(.58rem,.9vw,.68rem);letter-spacing:.28em;text-transform:uppercase;color:#c9a84c;margin-bottom:.65rem;opacity:0;animation:fadeUp .8s ease .3s forwards}
.main-names{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,8vw,4.4rem);font-weight:300;color:#f0e8d8;line-height:1.08;letter-spacing:.03em;opacity:0;animation:fadeUp .8s ease .7s forwards}
.main-names em{color:#c9a84c;font-style:italic}
.gold-bar{height:1px;width:0;background:linear-gradient(to right,transparent,#c9a84c,transparent);margin:.85rem auto;animation:expandBar .9s ease 1.1s forwards}
.sub-date{font-family:'Cormorant Garamond',serif;font-size:clamp(.8rem,2.5vw,1.1rem);color:#d4c4a0;letter-spacing:.1em;font-weight:300;margin-bottom:.5rem;opacity:0;animation:fadeUp .8s ease 1.3s forwards}
.countdown{font-size:clamp(.6rem,1.8vw,.75rem);letter-spacing:.16em;color:#c9a84c;margin-bottom:1.2rem;opacity:0;animation:fadeUp .8s ease 1.5s forwards}
.cover-btns{display:flex;flex-direction:column;align-items:center;gap:.65rem;opacity:0;animation:fadeUp .8s ease 1.7s forwards}
.btn-enter{background:transparent;border:1.5px solid #c9a84c;color:#c9a84c;font-family:'Raleway',sans-serif;font-size:clamp(.65rem,1.8vw,.72rem);letter-spacing:.22em;text-transform:uppercase;padding:.75rem 2.2rem;cursor:pointer;transition:all .3s;min-height:44px;min-width:180px}
.btn-enter:hover,.btn-enter:active{background:rgba(201,168,76,.15)}
.btn-rsvp{background:rgba(201,168,76,.12);border:1.5px solid rgba(201,168,76,.6);color:#c9a84c;font-family:'Raleway',sans-serif;font-size:clamp(.62rem,1.8vw,.68rem);letter-spacing:.22em;text-transform:uppercase;padding:.65rem 2.2rem;cursor:pointer;transition:all .3s;min-height:44px;min-width:180px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:.4rem}
.btn-rsvp:hover,.btn-rsvp:active{background:rgba(201,168,76,.25);border-color:#c9a84c}
.invite-screen{display:grid;grid-template-rows:auto auto auto 1fr auto auto;align-items:center;justify-items:center;
  padding-top:calc(.7rem + env(safe-area-inset-top));padding-bottom:calc(2.6rem + env(safe-area-inset-bottom))}
.screen-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:1;transition:opacity 1.2s ease}
.screen.on .screen-bg{animation:kenBurns 3s ease-out forwards}
.screen-overlay{position:absolute;inset:0;z-index:0;
  background:linear-gradient(to bottom,rgba(8,6,4,.55) 0%,rgba(8,6,4,.15) 30%,rgba(8,6,4,.15) 70%,rgba(8,6,4,.65) 100%),
             linear-gradient(to right,rgba(8,6,4,.3) 0%,transparent 25%,transparent 75%,rgba(8,6,4,.3) 100%)}
.ev-num{font-family:'Cormorant Garamond',serif;font-size:.85rem;color:#c9a84c;font-style:italic;margin-bottom:.1rem;position:relative;z-index:2;text-shadow:0 1px 6px rgba(0,0,0,.9);
  opacity:0;transition:opacity .9s ease,transform .9s ease;transform:translateY(10px)}
.ev-name{font-size:clamp(.55rem,1.6vw,.63rem);letter-spacing:.24em;text-transform:uppercase;color:rgba(201,168,76,.9);margin-bottom:.3rem;position:relative;z-index:2;text-shadow:0 1px 6px rgba(0,0,0,.9);
  opacity:0;transition:opacity .9s ease .1s,transform .9s ease .1s;transform:translateY(10px)}
.gold-bar-sm{height:1px;width:0;background:linear-gradient(to right,transparent,#c9a84c,transparent);margin:.3rem auto;position:relative;z-index:2;transition:width 1s ease .2s}
.card-img-wrap{width:100%;display:flex;align-items:center;justify-content:center;padding:0 .6rem;min-height:0;position:relative;z-index:2;
  opacity:0;transition:opacity 1s ease .3s,transform 1s ease .3s;transform:translateY(16px) scale(.97)}
.card-img-wrap img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;border-radius:4px;display:block;
  box-shadow:0 12px 60px rgba(0,0,0,.7),0 0 0 1px rgba(201,168,76,.18)}
.card-img-wrap::after{content:'';position:absolute;inset:0;border-radius:4px;background:linear-gradient(135deg,transparent 40%,rgba(201,168,76,.07) 50%,transparent 60%);background-size:200% 200%;animation:shimmerCard 3s ease-in-out infinite;pointer-events:none}
.action-row{display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap;justify-content:center;padding:0 1rem;position:relative;z-index:2;
  opacity:0;transition:opacity .9s ease .5s}
.act-btn{background:rgba(8,6,4,.45);border:1px solid rgba(201,168,76,.5);color:rgba(201,168,76,.9);font-family:'Raleway',sans-serif;font-size:clamp(.58rem,1.6vw,.6rem);letter-spacing:.16em;text-transform:uppercase;padding:.5rem 1rem;cursor:pointer;border-radius:2px;transition:background .25s,border .25s,color .25s;min-height:44px;display:flex;align-items:center;gap:.3rem;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.act-btn:hover,.act-btn:active{background:rgba(201,168,76,.2);border-color:#c9a84c;color:#c9a84c}
.tip{font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(240,232,216,.4);margin-top:.3rem;position:relative;z-index:2;text-shadow:0 1px 4px rgba(0,0,0,.9);
  opacity:0;transition:opacity .9s ease .6s}
.invite-screen.revealed .screen-bg{opacity:.28}
.invite-screen.revealed .ev-num{opacity:1;transform:translateY(0)}
.invite-screen.revealed .ev-name{opacity:1;transform:translateY(0)}
.invite-screen.revealed .gold-bar-sm{width:160px}
.invite-screen.revealed .card-img-wrap{opacity:1;transform:translateY(0) scale(1)}
.invite-screen.revealed .action-row{opacity:1}
.invite-screen.revealed .tip{opacity:1}
.progress-ring{position:absolute;bottom:1.8rem;left:50%;transform:translateX(-50%);z-index:3;opacity:0;transition:opacity .4s ease}
.progress-ring.show{opacity:1}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring circle{transition:stroke-dashoffset 3s linear;stroke-dasharray:56.5;stroke-dashoffset:56.5}
.skip-btn{position:absolute;bottom:1.4rem;right:1.2rem;z-index:3;background:rgba(8,6,4,.4);border:1px solid rgba(201,168,76,.3);color:rgba(201,168,76,.7);font-family:'Raleway',sans-serif;font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;padding:.4rem .8rem;cursor:pointer;border-radius:2px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);opacity:0;transition:opacity .4s ease .3s,background .2s,color .2s}
.skip-btn.show{opacity:1}
.skip-btn:hover{background:rgba(201,168,76,.15);color:#c9a84c}
.prev-btn,.next-btn{position:fixed;top:50%;transform:translateY(-50%);background:rgba(8,6,4,.35);border:1px solid rgba(201,168,76,.35);color:#c9a84c;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:.95rem;z-index:50;display:flex;align-items:center;justify-content:center;transition:all .25s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.prev-btn:hover,.next-btn:hover{background:rgba(201,168,76,.22);border-color:#c9a84c}
.prev-btn{left:.5rem}.next-btn{right:.5rem}
.dots{position:fixed;bottom:calc(.5rem + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:50}
.dot{width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.dot::after{content:'';width:7px;height:7px;border-radius:50%;border:1.5px solid rgba(201,168,76,.45);background:transparent;transition:all .3s;display:block}
.dot.on::after{background:#c9a84c;border-color:#c9a84c;width:20px;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes expandBar{from{width:0}to{width:200px}}
@keyframes shimmerCard{0%,100%{background-position:200% 0}50%{background-position:-200% 0}}
@keyframes kenBurns{from{transform:scale(1)}to{transform:scale(1.08)}}
@media(max-width:380px){.cover-body{padding:1rem 1.5rem}.cover-btns{gap:.5rem}}
</style>
</head>

<canvas id="particle-canvas"></canvas>
<canvas id="glitter-canvas"></canvas>
<div class="wrap">

<div class="screen on" id="s0">
  <img class="cover-img" id="img-couple" alt="Shinal and Janendra">
  <div class="cover-fade"></div>
  <div class="cover-body">
    <p class="pre-tag">You are warmly invited to celebrate</p>
    <h1 class="main-names"><em>Shinal</em> &amp; <em>Janendra</em></h1>
    <div class="gold-bar"></div>
    <p class="sub-date">24 &ndash; 25 October 2026 &nbsp;&middot;&nbsp; Auckland, New Zealand</p>
    <p class="countdown" id="countdown"></p>
    <div class="cover-btns">
      <button class="btn-enter" onclick="go(1)">View Invitations &rarr;</button>
      <a class="btn-rsvp" href="https://docs.google.com/forms/d/e/1FAIpQLSfBiBuoxFrtp3ODUaWRq81Hi8bKQxsPD8ZvzuWQk9ba2nEWEA/viewform" target="_blank" rel="noopener">&#9998;&nbsp;RSVP Now</a>
    </div>
  </div>
</div>

<div class="screen invite-screen" id="s1">
  <img class="screen-bg" id="bg-s1" alt=""><div class="screen-overlay"></div>
  <p class="ev-num">01 / 02</p><p class="ev-name">Hindu Wedding</p>
  <div class="gold-bar-sm"></div>
  <div class="card-img-wrap"><img id="img-wedding" alt="Hindu Wedding invitation"></div>
  <div class="action-row"><button class="act-btn" onclick="addCal(1)">&#43;&nbsp;Add to Calendar</button><a class="act-btn" href="https://maps.google.com/?q=143+Favona+Road+Favona+Auckland+2024" target="_blank" rel="noopener">&#9906;&nbsp;Get Directions</a></div>
  <p class="tip">Swipe or use arrows to continue</p>
  <div class="progress-ring" id="ring-1"><svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="9" fill="none" stroke="rgba(201,168,76,.3)" stroke-width="1.5"/><circle cx="10" cy="10" r="9" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/></svg></div>
  <button class="skip-btn" id="skip-1" onclick="revealCard(1)">Tap to reveal &rarr;</button>
</div>

<div class="screen invite-screen" id="s2">
  <img class="screen-bg" id="bg-s2" alt=""><div class="screen-overlay"></div>
  <p class="ev-num">02 / 02</p><p class="ev-name">Reception Night</p>
  <div class="gold-bar-sm"></div>
  <div class="card-img-wrap"><img id="img-reception" alt="Reception invitation"></div>
  <div class="action-row"><button class="act-btn" onclick="addCal(2)">&#43;&nbsp;Add to Calendar</button><a class="act-btn" href="https://maps.google.com/?q=5+Clark+Road+Karaka+Auckland+2580" target="_blank" rel="noopener">&#9906;&nbsp;Get Directions</a></div>
  <p class="tip">We can&#39;t wait to celebrate with you! &#127801;</p>
  <div class="progress-ring" id="ring-2"><svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="9" fill="none" stroke="rgba(201,168,76,.3)" stroke-width="1.5"/><circle cx="10" cy="10" r="9" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/></svg></div>
  <button class="skip-btn" id="skip-2" onclick="revealCard(2)">Tap to reveal &rarr;</button>
</div>

</div>
<button class="prev-btn" id="pb" onclick="go(cur-1)" aria-label="Previous">&#8592;</button>
<button class="next-btn" id="nb" onclick="go(cur+1)" aria-label="Next">&#8594;</button>
<div class="dots" id="dots"></div>

(function() {
  var target = new Date("2026-10-24T17:00:00+13:00");
  function tick() {
    var diff = target - new Date();
    if (diff <= 0) { document.getElementById("countdown").textContent = "Today is the big day!"; return; }
    var d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000),
        m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
    document.getElementById("countdown").textContent = d+"d  "+h+"h  "+m+"m  "+s+"s";
    setTimeout(tick, 1000);
  } tick();
})();

(function() {
  var c=document.getElementById("particle-canvas"), ctx=c.getContext("2d"), W, H, P=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize(); window.addEventListener("resize",resize);
  for(var i=0;i<55;i++) P.push(mk());
  function mk(){return{x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.6+.4,a:Math.random()*Math.PI*2,sp:Math.random()*.35+.12,op:Math.random()*.55+.15,tw:Math.random()*2+1};}
  function draw(){
    ctx.clearRect(0,0,W,H); var now=Date.now()/1000;
    P.forEach(function(p){
      p.y-=p.sp; p.x+=Math.sin(now/p.tw+p.a)*0.3;
      if(p.y<-5){p.y=H+5;p.x=Math.random()*W;}
      ctx.globalAlpha=p.op*(0.7+0.3*Math.sin(now*2.5+p.a));
      ctx.fillStyle="#c9a84c"; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }); requestAnimationFrame(draw);
  } draw();
})();

(function() {
  var gc=document.getElementById('glitter-canvas'), gctx=gc.getContext('2d'), GW, GH, sparks=[];
  function resizeG(){GW=gc.width=window.innerWidth;GH=gc.height=window.innerHeight;}
  resizeG(); window.addEventListener('resize',resizeG);
  for(var i=0;i<80;i++) sparks.push(mkS());
  function mkS(){return{x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.5+0.4,maxOp:Math.random()*.75+.25,ts:Math.random()*.04+.015,to:Math.random()*Math.PI*2,drift:(Math.random()-.5)*.15,rise:Math.random()*.12+.04};}
  function getRect(){var a=document.querySelector('.screen.on.invite-screen');if(!a)return null;var img=a.querySelector('.card-img-wrap img');if(!img||!img.complete||!img.naturalWidth)return null;return img.getBoundingClientRect();}
  function drawG(){
    gctx.clearRect(0,0,GW,GH); var rect=getRect();
    if(!rect||rect.width<10){requestAnimationFrame(drawG);return;}
    var now=Date.now()/1000;
    sparks.forEach(function(p){
      p.y-=p.rise; p.x+=p.drift;
      if(p.y<rect.top-5||p.y>rect.bottom+5||p.x<rect.left-5||p.x>rect.right+5){
        p.x=rect.left+Math.random()*rect.width; p.y=rect.top+Math.random()*rect.height;
        p.drift=(Math.random()-.5)*.15; p.rise=Math.random()*.12+.04;
      }
      var op=p.maxOp*(0.5+0.5*Math.sin(now*p.ts*60+p.to));
      gctx.save(); gctx.globalAlpha=op; gctx.translate(p.x,p.y);
      if(p.r>1.1){
        var s=p.r*2.5; gctx.strokeStyle='#e8d090'; gctx.lineWidth=p.r*.65; gctx.lineCap='round';
        gctx.beginPath(); gctx.moveTo(0,-s); gctx.lineTo(0,s); gctx.moveTo(-s,0); gctx.lineTo(s,0); gctx.stroke();
        gctx.fillStyle='#ffffff'; gctx.globalAlpha=op*.9; gctx.beginPath(); gctx.arc(0,0,p.r*.5,0,Math.PI*2); gctx.fill();
      } else {
        gctx.fillStyle='#c9a84c'; gctx.beginPath(); gctx.arc(0,0,p.r,0,Math.PI*2); gctx.fill();
      }
      gctx.restore();
    }); requestAnimationFrame(drawG);
  } drawG();
})();

var total=3, cur=0, revealTimers={};
var dc=document.getElementById("dots");
for(var i=0;i<total;i++){
  var el=document.createElement("div");
  el.className="dot"+(i===0?" on":"");
  (function(x){el.onclick=function(){go(x);};})(i);
  dc.appendChild(el);
}
function revealCard(idx){
  if(revealTimers[idx]){clearTimeout(revealTimers[idx]);delete revealTimers[idx];}
  document.getElementById("s"+idx).classList.add("revealed");
  var ring=document.getElementById("ring-"+idx), skip=document.getElementById("skip-"+idx);
  if(ring) ring.classList.remove("show"); if(skip) skip.classList.remove("show");
}
function startRevealTimer(idx){
  var screen=document.getElementById("s"+idx);
  if(screen.classList.contains("revealed")) return;
  var ring=document.getElementById("ring-"+idx), skip=document.getElementById("skip-"+idx);
  if(ring){ring.classList.add("show");var circle=ring.querySelectorAll("circle")[1];
    setTimeout(function(){circle.style.transition="stroke-dashoffset 3s linear";circle.style.strokeDashoffset="0";},30);}
  if(skip) skip.classList.add("show");
  revealTimers[idx]=setTimeout(function(){revealCard(idx);},3000);
}
function resetScreen(idx){
  if(idx===0) return;
  document.getElementById("s"+idx).classList.remove("revealed");
  var ring=document.getElementById("ring-"+idx), skip=document.getElementById("skip-"+idx);
  if(ring){ring.classList.remove("show");var circle=ring.querySelectorAll("circle")[1];circle.style.transition="none";circle.style.strokeDashoffset="56.5";}
  if(skip) skip.classList.remove("show");
  if(revealTimers[idx]){clearTimeout(revealTimers[idx]);delete revealTimers[idx];}
}
function go(n){
  if(n<0||n>=total) return;
  if(cur!==0) resetScreen(cur);
  document.getElementById("s"+cur).classList.remove("on"); dc.children[cur].classList.remove("on");
  cur=n;
  document.getElementById("s"+cur).classList.add("on"); dc.children[cur].classList.add("on");
  document.getElementById("pb").style.opacity=cur===0?"0.2":"1";
  document.getElementById("nb").style.opacity=cur===total-1?"0.2":"1";
  if(cur>0) startRevealTimer(cur);
}
go(0);
var sx=null;
document.addEventListener("touchstart",function(e){sx=e.touches[0].clientX;},{passive:true});
document.addEventListener("touchend",function(e){
  if(!sx) return; var dx=e.changedTouches[0].clientX-sx;
  if(Math.abs(dx)>45) go(dx<0?cur+1:cur-1); sx=null;
});
document.addEventListener("keydown",function(e){
  if(e.key==="ArrowRight") go(cur+1); if(e.key==="ArrowLeft") go(cur-1);
});
